name: Validate JSON Data

on:
  pull_request:
    paths:
      - 'data/**'
      - 'schemas/**'
      - 'scripts/validate.js'
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'schemas/**'
      - 'scripts/validate.js'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm test
